<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prairie Restoration Timeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e8f5e9;
    overflow-x: hidden;
  }
  #controls {
    background: #fff;
    padding: 16px 24px;
    border-bottom: 2px solid #c8e6c9;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 20px;
  }
  h2 {
    margin: 0;
    color: #2e7d32;
    font-size: 1.3em;
    flex-basis: 100%;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  label {
    font-size: 0.9em;
    color: #333;
    font-weight: 600;
  }
  #yearSlider {
    width: 220px;
    accent-color: #2e7d32;
  }
  #yearDisplay {
    font-size: 1.1em;
    font-weight: 700;
    color: #2e7d32;
    min-width: 60px;
  }
  .toggle-btn {
    padding: 6px 14px;
    border: 2px solid #2e7d32;
    background: #fff;
    color: #2e7d32;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85em;
    font-weight: 600;
    transition: all 0.2s;
  }
  .toggle-btn.active {
    background: #2e7d32;
    color: #fff;
  }
  .toggle-btn:hover {
    background: #c8e6c9;
  }
  .toggle-btn.active:hover {
    background: #1b5e20;
  }
  #metrics {
    display: flex;
    gap: 16px;
    padding: 12px 24px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    flex-wrap: wrap;
  }
  .metric {
    background: #e8f5e9;
    border-radius: 10px;
    padding: 10px 18px;
    min-width: 120px;
    text-align: center;
  }
  .metric-label {
    font-size: 0.75em;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .metric-value {
    font-size: 1.5em;
    font-weight: 700;
    color: #2e7d32;
  }
  main { display: flex; justify-content: center; }
</style>
</head>
<body>

<div id="controls">
  <h2>Prairie Restoration Timeline</h2>
  <div class="control-group">
    <label for="yearSlider">Year:</label>
    <input type="range" id="yearSlider" min="0" max="10" value="0" step="1">
    <span id="yearDisplay">Year 0</span>
  </div>
  <div class="control-group">
    <button class="toggle-btn active" id="managedBtn" onclick="toggleManagement(true)">With Management</button>
    <button class="toggle-btn" id="unmanagedBtn" onclick="toggleManagement(false)">Without Management</button>
  </div>
</div>
<div id="metrics">
  <div class="metric"><div class="metric-label">Species Count</div><div class="metric-value" id="speciesCount">3</div></div>
  <div class="metric"><div class="metric-label">Ground Cover</div><div class="metric-value" id="groundCover">15%</div></div>
  <div class="metric"><div class="metric-label">Weed Cover</div><div class="metric-value" id="weedCover">70%</div></div>
  <div class="metric"><div class="metric-label">Phase</div><div class="metric-value" id="phase" style="font-size:0.9em;">Bare Soil</div></div>
</div>
<main><div id="canvas-container"></div></main>

<script>
let year = 0;
let managed = true;
let canvasH = 500;

const slider = document.getElementById('yearSlider');
slider.addEventListener('input', () => {
  year = parseInt(slider.value);
  document.getElementById('yearDisplay').textContent = 'Year ' + year;
  updateMetrics();
});

function toggleManagement(val) {
  managed = val;
  document.getElementById('managedBtn').classList.toggle('active', val);
  document.getElementById('unmanagedBtn').classList.toggle('active', !val);
  updateMetrics();
}

function getMetrics(y, m) {
  if (m) {
    const species = [3,8,14,20,28,38,48,60,72,85,100];
    const cover = [15,30,45,60,72,80,86,90,93,95,97];
    const weed = [70,50,35,22,14,9,6,4,3,2,1];
    return { species: species[y], cover: cover[y], weed: weed[y] };
  } else {
    const species = [3,6,8,10,12,12,11,10,9,8,7];
    const cover = [15,25,32,38,42,44,43,40,38,35,32];
    const weed = [70,55,48,42,40,42,48,55,60,65,70];
    return { species: species[y], cover: cover[y], weed: weed[y] };
  }
}

function getPhase(y) {
  if (y === 0) return 'Bare Soil';
  if (y === 1) return 'Cover Crops';
  if (y <= 3) return 'Establishment';
  if (y <= 5) return 'Transition';
  if (y <= 7) return 'Maturing';
  return 'Mature Prairie';
}

function updateMetrics() {
  const m = getMetrics(year, managed);
  document.getElementById('speciesCount').textContent = m.species;
  document.getElementById('groundCover').textContent = m.cover + '%';
  document.getElementById('weedCover').textContent = m.weed + '%';
  document.getElementById('phase').textContent = getPhase(year);
}

// p5.js sketch
function setup() {
  canvasH = max(400, windowHeight - 200);
  let cnv = createCanvas(windowWidth, canvasH);
  cnv.parent('canvas-container');
  noLoop();
  slider.addEventListener('input', () => redraw());
  document.getElementById('managedBtn').addEventListener('click', () => redraw());
  document.getElementById('unmanagedBtn').addEventListener('click', () => redraw());
}

function windowResized() {
  canvasH = max(400, windowHeight - 200);
  resizeCanvas(windowWidth, canvasH);
  redraw();
}

function draw() {
  let m = getMetrics(year, managed);
  let skyTop = color(135, 206, 235);
  let skyBot = color(200, 230, 255);
  for (let i = 0; i < canvasH * 0.55; i++) {
    let c = lerpColor(skyTop, skyBot, i / (canvasH * 0.55));
    stroke(c); line(0, i, width, i);
  }

  // Sun
  noStroke();
  fill(255, 220, 50, 180);
  ellipse(width - 80, 60, 70, 70);

  let groundY = canvasH * 0.55;
  let soilBottom = canvasH;

  // Ground / soil cross-section
  drawSoilLayers(groundY, soilBottom, m);

  // Draw plants
  randomSeed(42);
  drawVegetation(groundY, m);

  // Draw underground roots
  randomSeed(42);
  drawRoots(groundY, soilBottom);

  // Label
  noStroke();
  fill(0, 0, 0, 50);
  rect(10, canvasH - 36, 260, 28, 6);
  fill(255);
  textSize(13);
  textAlign(LEFT, CENTER);
  text(managed ? 'Managed Prairie' : 'Unmanaged (No Burns/Weeding)', 18, canvasH - 22);
}

function drawSoilLayers(groundY, bottom, m) {
  // Topsoil
  noStroke();
  let topsoilDepth = map(year, 0, 10, 20, managed ? 60 : 30);
  fill(80, 50, 20);
  rect(0, groundY, width, topsoilDepth);
  // Subsoil
  fill(140, 100, 50);
  rect(0, groundY + topsoilDepth, width, bottom - groundY - topsoilDepth);
  // Surface - grass/soil mix
  let greenness = map(m.cover, 0, 100, 120, 60);
  fill(greenness, map(m.cover, 0, 100, 90, 140), 30);
  rect(0, groundY - 4, width, 8);
}

function drawVegetation(groundY, m) {
  let plantCount = floor(map(m.cover, 0, 100, 5, width / 12));
  let weedCount = floor(map(m.weed, 0, 100, 0, width / 25));
  let flowerChance = year >= 4 ? map(year, 4, 10, 0.1, managed ? 0.5 : 0.15) : 0;

  // Draw weeds first (background)
  for (let i = 0; i < weedCount; i++) {
    let x = random(20, width - 20);
    let h = random(15, 40);
    stroke(100, 160, 60);
    strokeWeight(1.5);
    line(x, groundY, x, groundY - h);
    // Weed leaf
    noStroke();
    fill(100, 160, 60, 180);
    ellipse(x, groundY - h, 6, 10);
  }

  // Native grasses
  for (let i = 0; i < plantCount; i++) {
    let x = random(10, width - 10);
    let maxH = year === 0 ? 5 : map(year, 1, 10, 15, managed ? 120 : 50);
    let h = random(maxH * 0.5, maxH);
    let grassGreen = color(40 + random(30), 120 + random(40), 30 + random(20));

    stroke(grassGreen);
    strokeWeight(random(1, 2.5));
    let sway = sin(x * 0.05) * 5;
    // Blade of grass with slight curve
    noFill();
    beginShape();
    vertex(x, groundY);
    quadraticVertex(x + sway, groundY - h * 0.6, x + sway * 1.5, groundY - h);
    endShape();

    // Flowers on some plants
    if (random() < flowerChance && h > 30) {
      noStroke();
      let flowerColors = [
        color(200, 100, 200), // purple coneflower
        color(255, 200, 50),  // black-eyed susan
        color(255, 100, 80),  // blanket flower
        color(180, 140, 255), // wild bergamot
        color(255, 255, 100), // prairie sunflower
      ];
      let fc = flowerColors[floor(random(flowerColors.length))];
      fill(fc);
      let fx = x + sway * 1.5;
      let fy = groundY - h;
      for (let p = 0; p < 6; p++) {
        let a = (TWO_PI / 6) * p;
        ellipse(fx + cos(a) * 4, fy + sin(a) * 4, 5, 8);
      }
      fill(80, 50, 20);
      ellipse(fx, fy, 5, 5);
    }
  }

  // Big bluestem / tall grass clumps for later years
  if (year >= 5 && managed) {
    for (let i = 0; i < 8; i++) {
      let cx = random(40, width - 40);
      for (let b = 0; b < 5; b++) {
        let bx = cx + random(-8, 8);
        let bh = random(80, 140);
        stroke(50, 110, 40);
        strokeWeight(2);
        noFill();
        beginShape();
        vertex(bx, groundY);
        quadraticVertex(bx + random(-10, 10), groundY - bh * 0.5, bx + random(-15, 15), groundY - bh);
        endShape();
      }
      // Seed head
      noStroke();
      fill(160, 120, 60);
      let shx = cx + random(-10, 10);
      let shy = groundY - random(85, 140);
      for (let s = 0; s < 3; s++) {
        let sa = (TWO_PI / 3) * s - HALF_PI;
        rect(shx + cos(sa) * 2, shy + sin(sa) * 2, 2, 12);
      }
    }
  }
}

function drawRoots(groundY, bottom) {
  let rootDepth = managed ? map(year, 0, 10, 10, bottom - groundY - 20) : map(year, 0, 10, 10, (bottom - groundY) * 0.4);
  let rootCount = floor(map(year, 0, 10, 3, managed ? 30 : 10));
  stroke(120, 80, 40, 100);
  strokeWeight(1);
  for (let i = 0; i < rootCount; i++) {
    let rx = random(20, width - 20);
    let rd = random(rootDepth * 0.3, rootDepth);
    line(rx, groundY + 4, rx + random(-20, 20), groundY + 4 + rd);
    // Branch roots
    if (rd > 30) {
      let branchY = groundY + 4 + rd * 0.5;
      line(rx + random(-10, 10), branchY, rx + random(-30, 30), branchY + random(10, rd * 0.4));
    }
  }

  // Root depth label
  if (year > 0) {
    noStroke();
    fill(120, 80, 40, 180);
    textSize(11);
    textAlign(LEFT, TOP);
    let depthFt = managed ? map(year, 0, 10, 0, 8).toFixed(1) : map(year, 0, 10, 0, 3).toFixed(1);
    text('Root depth: ~' + depthFt + ' ft', 14, groundY + 12);
  }
}

updateMetrics();
</script>
</body>
</html>
