let selSpecies, selSize, selSite, selSeason;
let recommendation = null;
let scrollY = 0;
let controlsY = 120;

function setup() {
  let canvas = createCanvas(windowWidth, max(800, windowHeight));
  canvas.style('display', 'block');
  textFont('Segoe UI, Tahoma, sans-serif');

  let leftCol = 30;
  let rightCol = windowWidth / 2 + 10;
  let selW = min(280, windowWidth / 2 - 50);
  let row1 = controlsY + 25;
  let row2 = controlsY + 95;

  selSpecies = createSelect();
  selSpecies.position(leftCol, row1);
  selSpecies.style('width', selW + 'px');
  styleSelect(selSpecies);
  selSpecies.option('-- Select Species --', '');
  for (let sp of Object.keys(strategies)) selSpecies.option(sp);
  selSpecies.changed(generateRecommendation);

  selSize = createSelect();
  selSize.position(rightCol, row1);
  selSize.style('width', selW + 'px');
  styleSelect(selSize);
  selSize.option('-- Infestation Size --', '');
  selSize.option('Small (< 0.25 acre)', 'small');
  selSize.option('Medium (0.25 - 2 acres)', 'medium');
  selSize.option('Large (> 2 acres)', 'large');
  selSize.changed(generateRecommendation);

  selSite = createSelect();
  selSite.position(leftCol, row2);
  selSite.style('width', selW + 'px');
  styleSelect(selSite);
  selSite.option('-- Site Type --', '');
  selSite.option('Residential', 'residential');
  selSite.option('Park / Public Land', 'park');
  selSite.option('Wetland', 'wetland');
  selSite.option('Woodland', 'woodland');
  selSite.changed(generateRecommendation);

  selSeason = createSelect();
  selSeason.position(rightCol, row2);
  selSeason.style('width', selW + 'px');
  styleSelect(selSeason);
  selSeason.option('-- Season --', '');
  selSeason.option('Spring', 'spring');
  selSeason.option('Summer', 'summer');
  selSeason.option('Fall', 'fall');
  selSeason.option('Winter', 'winter');
  selSeason.changed(generateRecommendation);
}

function styleSelect(sel) {
  sel.style('padding', '8px 12px');
  sel.style('font-size', '15px');
  sel.style('border', '2px solid #81c784');
  sel.style('border-radius', '8px');
  sel.style('background', '#ffffff');
  sel.style('color', '#1b5e20');
  sel.style('cursor', 'pointer');
  sel.style('outline', 'none');
  sel.style('font-family', 'Segoe UI, Tahoma, sans-serif');
}

function generateRecommendation() {
  let sp = selSpecies.value();
  let sz = selSize.value();
  let site = selSite.value();
  let season = selSeason.value();

  if (!sp || !sz || !site || !season) {
    recommendation = null;
    return;
  }

  let data = strategies[sp];
  if (!data) { recommendation = null; return; }

  // Rank strategies based on inputs
  let ranked = [];
  let methodNames = { manual: 'Manual Removal', mechanical: 'Mechanical Control', chemical: 'Chemical Treatment', biological: 'Biological Control', ipm: 'Integrated Pest Management (IPM)' };

  for (let method of ['manual', 'mechanical', 'chemical', 'biological', 'ipm']) {
    let score = 50; // base score
    let notes = [];

    // Size scoring
    if (sz === 'small') {
      if (method === 'manual') { score += 30; notes.push('Manual removal ideal for small areas'); }
      if (method === 'mechanical') { score -= 10; notes.push('Mechanical may be overkill for small area'); }
      if (method === 'chemical') { score += 10; }
      if (method === 'biological') { score -= 15; notes.push('Biocontrol better suited for larger areas'); }
      if (method === 'ipm') { score += 15; }
    } else if (sz === 'medium') {
      if (method === 'manual') { score -= 5; notes.push('Manual labor-intensive at this scale'); }
      if (method === 'mechanical') { score += 15; }
      if (method === 'chemical') { score += 20; }
      if (method === 'biological') { score += 10; }
      if (method === 'ipm') { score += 25; notes.push('IPM recommended for medium infestations'); }
    } else if (sz === 'large') {
      if (method === 'manual') { score -= 25; notes.push('Manual not practical at this scale'); }
      if (method === 'mechanical') { score += 20; }
      if (method === 'chemical') { score += 15; }
      if (method === 'biological') { score += 25; notes.push('Biocontrol excels at landscape scale'); }
      if (method === 'ipm') { score += 30; notes.push('IPM strongly recommended for large areas'); }
    }

    // Site scoring
    if (site === 'residential') {
      if (method === 'chemical') { score -= 15; notes.push('Chemical use limited near homes and gardens'); }
      if (method === 'manual') { score += 15; notes.push('Manual methods safe for residential areas'); }
      if (method === 'biological') { score -= 5; }
    } else if (site === 'wetland') {
      if (method === 'chemical') { score -= 20; notes.push('Requires aquatic-approved formulations and permits'); }
      if (method === 'mechanical') { score -= 15; notes.push('Heavy equipment damages wetland soils'); }
      if (method === 'biological') { score += 15; notes.push('Biocontrol well-suited for sensitive wetlands'); }
      if (method === 'manual') { score += 5; notes.push('Manual removal protects wetland integrity'); }
    } else if (site === 'park') {
      if (method === 'chemical') { score -= 10; notes.push('Public concern about chemical use in parks'); }
      if (method === 'ipm') { score += 10; notes.push('IPM builds public support and volunteer engagement'); }
    }

    // Season scoring
    if (season === 'winter') {
      if (method === 'manual') { score -= 10; notes.push('Frozen ground limits hand removal'); }
      if (method === 'biological') { score -= 20; notes.push('Biocontrol agents dormant in winter'); }
      if (method === 'mechanical') { score += 10; notes.push('Winter access can reduce site damage'); }
      if (method === 'chemical') { score -= 5; notes.push('Limited herbicide uptake in dormant season'); }
    } else if (season === 'spring') {
      if (method === 'manual') { score += 10; notes.push('Moist spring soil aids root removal'); }
      if (method === 'biological') { score += 10; notes.push('Good season for biocontrol releases'); }
    } else if (season === 'fall') {
      if (method === 'chemical') { score += 15; notes.push('Fall herbicide maximizes root translocation'); }
    }

    // Check if biocontrol actually exists for this species
    if (method === 'biological' && data.biological.steps[0].toLowerCase().includes('no approved')) {
      score -= 30;
      notes.push('No approved biocontrol agents for this species');
    }

    ranked.push({
      method: method,
      label: methodNames[method],
      score: constrain(score, 0, 100),
      data: data[method],
      notes: notes
    });
  }

  ranked.sort((a, b) => b.score - a.score);
  recommendation = { species: sp, size: sz, site: site, season: season, ranked: ranked };
  scrollY = 0;
}

function draw() {
  background('#e8f5e9');
  let w = width;

  // Header
  noStroke();
  fill('#2e7d32');
  rect(0, 0, w, 100);
  fill(255);
  textAlign(CENTER, CENTER);
  textSize(min(26, w * 0.04));
  textStyle(BOLD);
  text('Invasive Species Removal Strategy Selector', w / 2, 32);
  textSize(min(14, w * 0.025));
  textStyle(NORMAL);
  fill(200, 230, 200);
  text('Select conditions to get a recommended removal strategy with trade-offs', w / 2, 62);

  // Labels
  let leftCol = 30;
  let rightCol = w / 2 + 10;
  fill('#2e7d32');
  textAlign(LEFT, TOP);
  textSize(13);
  textStyle(BOLD);
  text('Invasive Species', leftCol, controlsY + 8);
  text('Infestation Size', rightCol, controlsY + 8);
  text('Site Type', leftCol, controlsY + 78);
  text('Season', rightCol, controlsY + 78);

  // Results area
  let resultsTop = controlsY + 145;

  if (!recommendation) {
    fill('#888');
    textSize(16);
    textStyle(ITALIC);
    textAlign(CENTER, TOP);
    text('Select all four parameters above to see recommendations.', w / 2, resultsTop + 30);
    return;
  }

  // Recommendation header
  fill('#2e7d32');
  textSize(18);
  textStyle(BOLD);
  textAlign(LEFT, TOP);
  text('Recommended Strategies for ' + recommendation.species, leftCol, resultsTop);
  stroke('#81c784');
  strokeWeight(2);
  line(leftCol, resultsTop + 26, w - 30, resultsTop + 26);
  noStroke();

  let cardY = resultsTop + 38 - scrollY;
  let cardW = w - 60;

  for (let i = 0; i < recommendation.ranked.length; i++) {
    let r = recommendation.ranked[i];
    let cardH = calculateCardHeight(r, cardW);

    if (cardY + cardH < resultsTop + 30) { cardY += cardH + 14; continue; }
    if (cardY > height + 50) { cardY += cardH + 14; continue; }

    // Card
    fill(i === 0 ? '#f1f8e9' : '#ffffff');
    stroke(i === 0 ? '#2e7d32' : '#c8e6c9');
    strokeWeight(i === 0 ? 3 : 1);
    rect(leftCol, cardY, cardW, cardH, 12);
    noStroke();

    // Rank badge
    let badgeColors = ['#2e7d32', '#558b2f', '#7cb342', '#9e9e9e', '#bdbdbd'];
    fill(badgeColors[i]);
    ellipse(leftCol + 25, cardY + 25, 36, 36);
    fill(255);
    textSize(16);
    textStyle(BOLD);
    textAlign(CENTER, CENTER);
    text(i + 1, leftCol + 25, cardY + 25);

    // Method name and score
    fill('#1b5e20');
    textSize(17);
    textStyle(BOLD);
    textAlign(LEFT, TOP);
    text(r.label, leftCol + 52, cardY + 12);

    // Score bar
    let barX = leftCol + 52;
    let barY = cardY + 36;
    let barW = min(200, cardW - 100);
    fill('#e0e0e0');
    rect(barX, barY, barW, 10, 5);
    let scoreColor = r.score > 70 ? '#2e7d32' : r.score > 50 ? '#ff8f00' : '#c62828';
    fill(scoreColor);
    rect(barX, barY, barW * r.score / 100, 10, 5);
    fill('#666');
    textSize(11);
    textStyle(NORMAL);
    text('Match: ' + r.score + '%', barX + barW + 8, barY - 1);

    // Best for badge
    if (i === 0) {
      let bx = leftCol + cardW - 120;
      fill('#2e7d32');
      rect(bx, cardY + 10, 100, 24, 12);
      fill(255);
      textSize(11);
      textStyle(BOLD);
      textAlign(CENTER, CENTER);
      text('BEST MATCH', bx + 50, cardY + 22);
    }

    // Context notes
    let ny = barY + 20;
    textAlign(LEFT, TOP);
    if (r.notes.length > 0) {
      fill('#555');
      textSize(12);
      textStyle(ITALIC);
      for (let n of r.notes) {
        text('  ' + n, leftCol + 52, ny, cardW - 80, 18);
        ny += 18;
      }
    }

    // Steps
    ny += 6;
    fill('#2e7d32');
    textSize(13);
    textStyle(BOLD);
    text('Steps:', leftCol + 20, ny);
    ny += 18;
    fill('#333');
    textSize(12);
    textStyle(NORMAL);
    for (let s of r.data.steps) {
      let stepText = '  ' + s;
      text(stepText, leftCol + 20, ny, cardW - 50, 36);
      ny += max(18, ceil(textWidth(stepText) / (cardW - 50)) * 16);
    }

    // Timing
    ny += 6;
    fill('#2e7d32');
    textSize(13);
    textStyle(BOLD);
    text('Timing:', leftCol + 20, ny);
    ny += 18;
    fill('#333');
    textSize(12);
    textStyle(NORMAL);
    text(r.data.timing, leftCol + 20, ny, cardW - 50, 36);
    ny += max(18, ceil(textWidth(r.data.timing) / (cardW - 50)) * 16);

    // Follow-up
    ny += 6;
    fill('#2e7d32');
    textSize(13);
    textStyle(BOLD);
    text('Follow-up:', leftCol + 20, ny);
    ny += 18;
    fill('#333');
    textSize(12);
    textStyle(NORMAL);
    text(r.data.followup, leftCol + 20, ny, cardW - 50, 36);
    ny += max(18, ceil(textWidth(r.data.followup) / (cardW - 50)) * 16);

    // Pros/Cons
    ny += 8;
    fill('#2e7d32');
    textSize(12);
    textStyle(BOLD);
    text('Pros: ', leftCol + 20, ny);
    fill('#333');
    textStyle(NORMAL);
    text(r.data.pros, leftCol + 60, ny, cardW - 90, 36);
    ny += max(20, ceil(textWidth(r.data.pros) / (cardW - 90)) * 16);

    ny += 4;
    fill('#c62828');
    textSize(12);
    textStyle(BOLD);
    text('Cons: ', leftCol + 20, ny);
    fill('#555');
    textStyle(NORMAL);
    text(r.data.cons, leftCol + 60, ny, cardW - 90, 36);

    cardY += cardH + 14;
  }
}

function calculateCardHeight(r, cardW) {
  textSize(12);
  let h = 60; // header + score bar
  h += r.notes.length * 18 + 6; // notes
  h += 18; // "Steps:" label
  for (let s of r.data.steps) {
    h += max(18, ceil(textWidth('  ' + s) / (cardW - 50)) * 16);
  }
  h += 24 + max(18, ceil(textWidth(r.data.timing) / (cardW - 50)) * 16); // timing
  h += 24 + max(18, ceil(textWidth(r.data.followup) / (cardW - 50)) * 16); // followup
  h += 8 + max(20, ceil(textWidth(r.data.pros) / (cardW - 90)) * 16); // pros
  h += 4 + max(20, ceil(textWidth(r.data.cons) / (cardW - 90)) * 16); // cons
  return h + 20; // padding
}

function mouseWheel(event) {
  if (recommendation) {
    let totalH = 0;
    let cardW = width - 60;
    for (let r of recommendation.ranked) totalH += calculateCardHeight(r, cardW) + 14;
    let maxScroll = max(0, totalH - (height - controlsY - 180));
    scrollY = constrain(scrollY + event.delta, 0, maxScroll);
    return false;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, max(800, windowHeight));
  let selW = min(280, windowWidth / 2 - 50);
  let rightCol = windowWidth / 2 + 10;
  selSpecies.position(30, controlsY + 25);
  selSpecies.style('width', selW + 'px');
  selSize.position(rightCol, controlsY + 25);
  selSize.style('width', selW + 'px');
  selSite.position(30, controlsY + 95);
  selSite.style('width', selW + 'px');
  selSeason.position(rightCol, controlsY + 95);
  selSeason.style('width', selW + 'px');
}
</script>
